{% extends "base.html" %}

{% block title %}
Recipe
{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 700px;">
  <div class="card">
    <div class="card-body">
      <h2 class="card-title mb-3">{{ recipe.title }}</h2>

      <div class="d-flex gap-2 flex-wrap mb-4">
        <span class="badge-outline badge-accent"><i class="bi bi-tag-fill"></i>{{ recipe.category }}</span>
        <span class="badge-outline"><i class="bi bi-globe2"></i>{{ recipe.cuisine }}</span>
      </div>

      <p class="mb-2 fw-semibold"><i class="bi bi-basket2 me-1"></i> Ingredients</p>
      <p class="card-text text-muted-app">{{ recipe.ingredients }}</p>

      <p class="mb-2 fw-semibold"><i class="bi bi-list-ol me-1"></i> Steps</p>
      <p class="card-text text-muted-app" style="white-space: pre-line;">{{ recipe.steps }}</p>

      <div class="mt-4 d-flex gap-2">
        <a href="{{ url_for('update_recipe', id=recipe._id) }}" class="btn btn-warning"><i class="bi bi-pencil"></i> Edit</a>
        <a href="{{ url_for('delete_recipe', id=recipe._id) }}" class="btn btn-danger"><i class="bi bi-trash"></i> Delete</a>
        <a href="{{ url_for('home') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Recipes</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Recipe Manager{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block custom_css %}{% endblock %}
</head>
<body>
  <nav class="app-navbar d-flex justify-content-between align-items-center">
    <a href="{{ url_for('home') if current_user.is_authenticated else url_for('login') }}" class="brand text-decoration-none">
      <i class="bi bi-journal-richtext"></i> Recipe Manager
    </a>
    <div id="themeToggle" class="theme-switch" role="button" aria-label="Toggle dark/light mode">
      <span class="knob"></span>
    </div>
  </nav>

  <main class="page-fade">
    {% block content %}
    {% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>

{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 80px);">
  <div class="card p-4" style="max-width: 400px; width: 100%;">
    <h2 class="text-center mb-4">Create Account</h2>

    <form method="post" class="needs-validation" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-group has-validation">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username" minlength="3" required>
          <div class="invalid-feedback">Username must be at least 3 characters.</div>
        </div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-group has-validation">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password" minlength="6" required>
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>
      </div>
      <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <div class="input-group has-validation">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password" minlength="6" required>
          <div class="invalid-feedback">Passwords do not match.</div>
        </div>
      </div>
      <button type="submit" class="btn btn-success w-100"><i class="bi bi-person-plus"></i> Register</button>
    </form>

    <p class="mt-3 text-center">
      Already have an account? <a href="{{ url_for('login') }}" class="link-underline">Login</a>
    </p>
  </div>
</div>
{% endblock %}
